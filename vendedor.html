<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="/manifest.json" />
  <title>CRM Posto — Vendedor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #25D366; --green-dark: #1ebe57;
      --primary: #1a1a2e; --accent: #e94560;
      --bg: #f4f6f9; --card: #ffffff;
      --text: #1a1a2e; --muted: #6b7280;
      --border: #e5e7eb; --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }
    header { background: var(--primary); color: #fff; padding: 20px 24px 16px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header p { font-size: 0.75rem; opacity: .65; margin-top: 2px; }
    .header-icon { width: 42px; height: 42px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .btn-sair { background: rgba(255,255,255,.15); border: none; color: #fff; font-size: 0.78rem; font-weight: 600; border-radius: 8px; padding: 6px 12px; cursor: pointer; }
    .tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 14px; text-align: center; font-size: 0.85rem; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    main { padding: 20px 16px; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
    .card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field:last-of-type { margin-bottom: 0; }
    .field label { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .field input { border: 1.5px solid var(--border); border-radius: 10px; padding: 13px 14px; font-size: 1rem; outline: none; transition: border-color .2s; background: #fafafa; }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field-hint { font-size: .72rem; color: var(--muted); }
    .seguro-row { display: flex; gap: 10px; margin-top: 4px; }
    .btn-seguro { flex: 1; padding: 13px 10px; border-radius: 10px; border: 2px solid var(--border); background: #fafafa; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .18s; color: var(--muted); }
    .btn-seguro.selected-sim { border-color: #16a34a; background: #f0fdf4; color: #16a34a; }
    .btn-seguro.selected-nao { border-color: var(--accent); background: #fff1f4; color: var(--accent); }
    .optional-tag { font-size: .68rem; font-weight: 600; background: #f0f4ff; color: #6b7280; border-radius: 4px; padding: 1px 6px; margin-left: 4px; text-transform: lowercase; vertical-align: middle; }
    .preview-bubble { background: #dcf8c6; border-radius: 12px 12px 12px 2px; padding: 12px 14px; font-size: .88rem; line-height: 1.5; color: #1a1a1a; border: 1px solid #c3e6aa; min-height: 60px; white-space: pre-wrap; word-break: break-word; }
    .preview-bubble .placeholder { color: #aaa; font-style: italic; }
    .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--green); color: #fff; font-size: 1rem; font-weight: 700; border: none; border-radius: var(--radius); padding: 16px; width: 100%; cursor: pointer; transition: background .2s; }
    .btn-whatsapp:hover { background: var(--green-dark); }
    .btn-whatsapp:disabled { background: #a8d5b5; cursor: not-allowed; }
    .btn-whatsapp svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }
    .counter-row { display: flex; gap: 12px; }
    .counter-chip { flex: 1; background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 10px; padding: 10px; text-align: center; }
    .counter-chip .num { font-size: 1.6rem; font-weight: 800; color: #16a34a; line-height: 1; }
    .counter-chip .lbl { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-top: 3px; font-weight: 600; }
    /* Leads table */
    .leads-list { display: flex; flex-direction: column; gap: 10px; }
    .lead-item { background: #fafafa; border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .lead-item .lead-nome { font-weight: 700; font-size: .95rem; }
    .lead-item .lead-info { font-size: .8rem; color: var(--muted); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 8px; }
    .lead-item .lead-tag { background: #f0f4ff; border-radius: 4px; padding: 2px 7px; font-size: .72rem; font-weight: 600; }
    .lead-item .lead-tag.sim { background: #f0fdf4; color: #16a34a; }
    .lead-item .lead-tag.nao { background: #fff1f4; color: var(--accent); }
    .lead-date { font-size: .7rem; color: #b0b7c3; margin-top: 6px; }
    .btn-export { display: flex; align-items: center; justify-content: center; gap: 8px; background: #217346; color: #fff; border: none; border-radius: 10px; padding: 12px; width: 100%; font-size: .9rem; font-weight: 700; cursor: pointer; margin-bottom: 12px; transition: background .2s; }
    .btn-export:hover { background: #1a5c37; }
    .empty { text-align: center; color: var(--muted); font-size: .9rem; padding: 24px 0; }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a2e; color: #fff; padding: 10px 20px; border-radius: 50px; font-size: .85rem; font-weight: 600; transition: transform .3s; z-index: 100; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    .loading { text-align: center; padding: 20px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>CRM Posto ⛽</h1>
    <p id="header-name">Carregando...</p>
  </div>
  <button class="btn-sair" onclick="sair()">Sair</button>
</header>

<div class="tabs">
  <div class="tab active" id="tab-novo" onclick="showTab('novo')">➕ Novo Lead</div>
  <div class="tab" id="tab-meus" onclick="showTab('meus')">📋 Meus Leads</div>
</div>

<main>

  <!-- TAB: Novo Lead -->
  <div id="section-novo">
    <div class="card">
      <h2>📊 Hoje</h2>
      <div class="counter-row">
        <div class="counter-chip"><div class="num" id="count-hoje">0</div><div class="lbl">Hoje</div></div>
        <div class="counter-chip"><div class="num" id="count-total">0</div><div class="lbl">Total</div></div>
      </div>
    </div>

    <div class="card">
      <h2>📋 Novo lead</h2>
      <div class="field">
        <label>Nome do cliente</label>
        <input type="text" id="nome" placeholder="Ex: João Silva" autocomplete="off" oninput="updatePreview()" />
      </div>
      <div class="field">
        <label>Telefone / WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(11) 9 0000-0000" autocomplete="off" oninput="maskPhone(this); updatePreview()" />
        <span class="field-hint">Somente números com DDD</span>
      </div>
      <div class="field">
        <label>Placa do veículo</label>
        <input type="text" id="placa" placeholder="ABC-1234 ou ABC1D23" maxlength="8" autocomplete="off" oninput="maskPlate(this); updatePreview()" />
      </div>
      <div class="field">
        <label>Possui seguro?</label>
        <div class="seguro-row">
          <button type="button" class="btn-seguro" id="btn-sim" onclick="selectSeguro('sim')">✅ Sim</button>
          <button type="button" class="btn-seguro" id="btn-nao" onclick="selectSeguro('nao')">❌ Não</button>
        </div>
      </div>
      <div class="field">
        <label>Se tem seguro, quanto paga mensalmente? <span class="optional-tag">opcional</span></label>
        <input type="text" id="valor-seguro" placeholder="Ex: R$ 250,00" autocomplete="off" oninput="updatePreview()" />
      </div>
    </div>

    <div class="card">
      <h2>💬 Prévia da mensagem</h2>
      <div class="preview-bubble" id="preview">
        <span class="placeholder">Preencha os dados acima para ver a mensagem...</span>
      </div>
    </div>

    <button class="btn-whatsapp" id="btn-send" onclick="enviarLead()" disabled>
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/></svg>
      Enviar pelo WhatsApp
    </button>
  </div>

  <!-- TAB: Meus Leads -->
  <div id="section-meus" style="display:none">
    <button class="btn-export" onclick="exportarExcel()">
      📊 Exportar para Excel
    </button>
    <div class="card">
      <h2>📋 Meus Leads</h2>
      <div class="leads-list" id="leads-list">
        <div class="loading">Carregando...</div>
      </div>
    </div>
  </div>

</main>

<div id="toast">✅ Lead enviado!</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script>
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUser = null;
  let currentPerfil = null;
  let seguro = null;
  let meusLeads = [];

  // ── Auth check
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/login.html'; return; }
    currentUser = session.user;

    const { data: perfil } = await sb.from('perfis').select('*').eq('id', currentUser.id).single();
    if (!perfil || perfil.role === 'gestor') { window.location.href = '/gestor.html'; return; }
    currentPerfil = perfil;

    document.getElementById('header-name').textContent = perfil.nome;
    loadCounters();
  }

  async function sair() {
    await sb.auth.signOut();
    window.location.href = '/login.html';
  }

  // ── Tabs
  function showTab(tab) {
    document.getElementById('section-novo').style.display  = tab === 'novo'  ? '' : 'none';
    document.getElementById('section-meus').style.display = tab === 'meus' ? '' : 'none';
    document.getElementById('tab-novo').className  = 'tab' + (tab === 'novo'  ? ' active' : '');
    document.getElementById('tab-meus').className = 'tab' + (tab === 'meus' ? ' active' : '');
    if (tab === 'meus') loadLeads();
  }

  // ── Counters
  async function loadCounters() {
    const hoje = new Date().toISOString().slice(0, 10);
    const { count: countHoje } = await sb.from('leads')
      .select('*', { count: 'exact', head: true })
      .eq('vendedor_id', currentUser.id)
      .gte('criado_em', hoje + 'T00:00:00');
    const { count: countTotal } = await sb.from('leads')
      .select('*', { count: 'exact', head: true })
      .eq('vendedor_id', currentUser.id);
    document.getElementById('count-hoje').textContent  = countHoje  || 0;
    document.getElementById('count-total').textContent = countTotal || 0;
  }

  // ── Seguro
  function selectSeguro(val) {
    seguro = val;
    document.getElementById('btn-sim').className = 'btn-seguro' + (val === 'sim' ? ' selected-sim' : '');
    document.getElementById('btn-nao').className = 'btn-seguro' + (val === 'nao' ? ' selected-nao' : '');
    updatePreview();
  }

  // ── Masks
  function maskPhone(el) {
    let v = el.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 10) v = v.replace(/^(\d{2})(\d{1})(\d{4})(\d{4})$/, '($1) $2 $3-$4');
    else if (v.length > 6) v = v.replace(/^(\d{2})(\d{4})(\d+)$/, '($1) $2-$3');
    else if (v.length > 2) v = v.replace(/^(\d{2})(\d+)$/, '($1) $2');
    el.value = v;
  }

  function maskPlate(el) {
    let v = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 7);
    if (v.length > 3) v = v.slice(0, 3) + '-' + v.slice(3);
    el.value = v;
  }

  // ── Preview
  function buildMessage() {
    const nome   = document.getElementById('nome').value.trim();
    const placa  = document.getElementById('placa').value.trim();
    const cons   = currentPerfil?.nome || '';
    return `Oiii ${nome || '{nome}'} aqui é a consultora ${cons}, vamos falar por aqui sobre a cotação da proteção do seu veículo de placa ${placa || '{placa}'}`;
  }

  function updatePreview() {
    const nome     = document.getElementById('nome').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    const placa    = document.getElementById('placa').value.trim();
    const ready = nome && telefone && placa && seguro;
    document.getElementById('btn-send').disabled = !ready;
    if (!nome && !placa) {
      document.getElementById('preview').innerHTML = '<span class="placeholder">Preencha os dados acima para ver a mensagem...</span>';
    } else {
      document.getElementById('preview').textContent = buildMessage();
    }
  }

  // ── Enviar
  async function enviarLead() {
    const nome        = document.getElementById('nome').value.trim();
    const telefone    = document.getElementById('telefone').value.replace(/\D/g, '');
    const placa       = document.getElementById('placa').value.trim();
    const valorSeguro = document.getElementById('valor-seguro').value.trim();

    // Salva no Supabase
    await sb.from('leads').insert({
      vendedor_id:   currentUser.id,
      nome,
      telefone,
      placa,
      seguro,
      valor_seguro:  valorSeguro || null,
    });

    // Abre WhatsApp
    const msg   = buildMessage();
    const phone = telefone.startsWith('55') ? telefone : '55' + telefone;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');

    showToast();
    resetForm();
    loadCounters();
  }

  function resetForm() {
    ['nome', 'telefone', 'placa', 'valor-seguro'].forEach(id => document.getElementById(id).value = '');
    seguro = null;
    document.getElementById('btn-sim').className = 'btn-seguro';
    document.getElementById('btn-nao').className = 'btn-seguro';
    updatePreview();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Meus Leads
  async function loadLeads() {
    const { data } = await sb.from('leads')
      .select('*')
      .eq('vendedor_id', currentUser.id)
      .order('criado_em', { ascending: false });

    meusLeads = data || [];
    const list = document.getElementById('leads-list');

    if (!meusLeads.length) {
      list.innerHTML = '<div class="empty">Nenhum lead ainda.</div>';
      return;
    }

    list.innerHTML = meusLeads.map(l => `
      <div class="lead-item">
        <div class="lead-nome">${l.nome}</div>
        <div class="lead-info">
          <span>📱 ${formatPhone(l.telefone)}</span>
          <span>🚗 ${l.placa}</span>
        </div>
        <div class="lead-info" style="margin-top:6px">
          <span class="lead-tag ${l.seguro}">Seguro: ${l.seguro === 'sim' ? '✅ Sim' : '❌ Não'}</span>
          ${l.valor_seguro ? `<span class="lead-tag">💰 ${l.valor_seguro}</span>` : ''}
        </div>
        <div class="lead-date">${formatDate(l.criado_em)}</div>
      </div>
    `).join('');
  }

  function formatPhone(t) {
    if (!t) return '-';
    t = t.replace(/\D/g, '');
    if (t.length === 11) return `(${t.slice(0,2)}) ${t.slice(2,3)} ${t.slice(3,7)}-${t.slice(7)}`;
    if (t.length === 10) return `(${t.slice(0,2)}) ${t.slice(2,6)}-${t.slice(6)}`;
    return t;
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  // ── Exportar Excel
  function exportarExcel() {
    if (!meusLeads.length) return alert('Nenhum lead para exportar.');
    const rows = meusLeads.map(l => ({
      Nome:           l.nome,
      Telefone:       formatPhone(l.telefone),
      Placa:          l.placa,
      'Possui Seguro': l.seguro === 'sim' ? 'Sim' : 'Não',
      'Valor Seguro': l.valor_seguro || '',
      Data:           formatDate(l.criado_em),
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Meus Leads');
    XLSX.writeFile(wb, `leads_${currentPerfil?.nome || 'vendedor'}_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  init();
</script>
</body>
</html>
