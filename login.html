<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="/manifest.json" />
  <title>CRM Posto — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 8px;
      text-align: center;
    }
    h1 {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
    }
    .sub {
      color: rgba(255,255,255,.5);
      font-size: 0.82rem;
      text-align: center;
      margin-bottom: 32px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .field label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: #e94560; }
    .btn-login {
      width: 100%;
      background: #e94560;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      margin-top: 4px;
      transition: background .2s;
    }
    .btn-login:hover { background: #d63651; }
    .btn-login:disabled { background: #f4a0ad; cursor: not-allowed; }
    .error {
      background: #fff1f4;
      color: #e94560;
      border: 1px solid #f4a0ad;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 14px;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="logo">⛽</div>
  <h1>CRM Posto</h1>
  <p class="sub">Proteção Veicular — Acesso</p>

  <div class="card">
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="btn-login" onclick="login()">Entrar</button>
    <div class="error" id="error-msg">E-mail ou senha incorretos.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Se já logado, redireciona
    sb.auth.getSession().then(({ data }) => {
      if (data.session) redirectByRole(data.session.user);
    });

    async function login() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn   = document.getElementById('btn-login');
      const err   = document.getElementById('error-msg');

      if (!email || !senha) return;
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      err.classList.remove('show');

      const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

      if (error) {
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Entrar';
        return;
      }

      redirectByRole(data.user);
    }

    async function redirectByRole(user) {
      const { data } = await sb.from('perfis').select('role').eq('id', user.id).single();
      if (data?.role === 'gestor') {
        window.location.href = '/gestor.html';
      } else {
        window.location.href = '/vendedor.html';
      }
    }

    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
